<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Expense Tracker</h1>
  <hr>


  <!-- Stats -->
  <div id="info-bar">
    <span>Balance: <span id="balance">₱0.00</span></span>
    <span>Income: <span id="income">₱0.00</span></span>
    <span>Expenses: <span id="expenses">₱0.00</span></span>
  </div>

  <!-- Add Transaction -->
  <h2>Add Transaction</h2>
  <form id="form-area">

    <select id="type">
      <option value="income">Income</option>
      <option value="expense">Expense</option>
    </select>

    <input type="number" id="amount" placeholder="Amount" min="0.01" step="0.01">

    <select id="category">
    <option value="Food">Food</option>
    <option value="Transportation">Transportation</option>
    <option value="Salary">Salary</option>
    <option value="Utilities">Utilities</option>
    <option value="Entertainment">Entertainment</option>
    <option value="Others">Others</option>

  </select>
    <input type="text" id="description" placeholder="Description">

    <input type="date" id="date">

    <button type="submit">Add</button>
  </form>

  <!-- Transactions List -->
   <br>
  <h2>Transactions</h2>
  <ul id="transactions"></ul>

  <!-- Edit Modal (hidden by default) -->
  <div id="edit-modal" class="modal hidden">
    <div class="modal-content">
      <h2>Edit Transaction</h2>
      
      <div class="form-group">
        <label>Type:</label>
        <select id="edit-type">
          <option value="income">Income</option>
          <option value="expense">Expense</option>
        </select>
      </div>

      <div class="form-group">
        <label>Amount:</label>
        <input type="number" id="edit-amount">
      </div>

      <div class="form-group">
        <label>Category:</label>
        <select id="edit-category">
          <option value="Food">Food</option>
          <option value="Transportation">Transportation</option>
          <option value="Salary">Salary</option>
          <option value="Utilities">Utilities</option>
          <option value="Entertainment">Entertainment</option>
          <option value="Others">Others</option>
        </select>
      </div>

      <div class="form-group">
        <label>Description:</label>
        <input type="text" id="edit-description">
      </div>

      <div class="form-group">
        <label>Date:</label>
        <input type="date" id="edit-date">
      </div>

      <div class="button-container">
        <button id="save-btn" class="btn btn-save">Save</button>
        <button id="cancel-btn" class="btn btn-cancel">Cancel</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
